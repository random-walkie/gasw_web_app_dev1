<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Book Hub - Library</title>
    <link rel="stylesheet" href="styles/styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Gift and Book Hub Web App Coursework">
    <meta name="author" content="Marta Nabais">
    <meta name="keywords" content="HTML, CSS, JavaScript, Web Development, Gift and Book Hub">
    <script defer src="javascript/responsiveTopNavBar.js"></script>
    <script defer src="javascript/utils.js"></script>
    <script defer src="javascript/dynamicBookSearchFields.js"></script>
    <script defer src="javascript/openLibrarySearchController.js"></script>
</head>
<body>
<div class="container">
    <header>
        <div class="banner-container">
            <div class="banner-content">
                <h1>Welcome to the Book Hub</h1>
            </div>
        </div>
        <nav class="topnav" id="my-top-nav" aria-label="Main navigation">
            <a href="index.html">Home</a>
            <a href="giftcard.html">Gift Cards</a>
            <a href="books.html" class="active">Book Library</a>
            <a href="javascript:void(0);" class="icon" role="button"
               aria-label="Toggle navigation menu" aria-expanded="false"
               onclick="responsiveTopNavBar()">☰</a>
        </nav>
    </header>
    <main>
        <section id="book-library">
            <h2>Book Library Search</h2>
            <form id="book-search">
                <fieldset>
                    <legend>Search for Books / Authors</legend>
                    <label for="search-term">Please enter book title or author name:</label>
                    <input type="text" id="search-term" name="searchTerm" required minlength="3" maxlength="50"
                           placeholder="e.g. Lord of the Flies">
                </fieldset>
                <input type="submit" value="Submit">
            </form>
            <!-- Dynamically display search filters with dynamicBookSearchFields.js -->
            <div id="book-filters"></div>
            <!-- Dynamically display search summary with openLibrarySearchController.js -->
            <div id="book-search-result-summary"></div>
            <!-- Dynamically display results after form submission with openLibrarySearchController.js -->
            <div id="book-search-result"></div>
        </section>
    </main>
    <footer>
        <nav aria-label="Footer navigation">
            <a href="index.html">Home</a>
            <a href="giftcard.html">Gift Cards</a>
            <a href="books.html">Book Library</a>
        </nav>
        <p>&copy; 2026 The Book Hub. All rights reserved.</p>
        <p>Powered by <a href="https://openlibrary.org" target="_blank" class="externalUrl">OpenLibrary</a></p>
        <p>
            <img src="https://jigsaw.w3.org/css-validator/images/vcss" alt="Valid CSS!" width="88" height="31">
        </p>
    </footer>
</div>
</body>
</html>
