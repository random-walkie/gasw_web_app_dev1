<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Book Hub - Gift Cards</title>
    <link rel="stylesheet" href="styles/styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Gift and Book Hub Web App Coursework">
    <meta name="author" content="Marta Nabais">
    <meta name="keywords" content="HTML, CSS, JavaScript, Web Development, Gift and Book Hub">
    <script defer src="javascript/responsiveTopNavBar.js"></script>
    <script defer src="javascript/utils.js"></script>
    <script defer src="javascript/dynamicDeliveryGiftCardFields.js"></script>
    <script defer src="javascript/giftCardCalculator.js"></script>
</head>
<body>
<div class="container">
    <header>
        <div class="banner-container">
            <div class="banner-content">
                <h1>Welcome to the Book Hub</h1>
            </div>
        </div>
        <nav class="topnav" id="my-top-nav" aria-label="Main navigation">
            <a href="index.html">Home</a>
            <a href="giftcard.html" class="active">Gift Cards</a>
            <a href="books.html">Book Library</a>
            <a href="javascript:void(0);" class="icon" role="button"
               aria-label="Toggle navigation menu" aria-expanded="false"
               onclick="responsiveTopNavBar()">☰</a>
        </nav>
    </header>
    <main>
        <section id="gift-card-calculator">
            <h2>Gift Card Calculator</h2>
            <form id="gift-card-form">
                <fieldset>
                    <legend>Gift Card Details</legend>
                    <label for="giftCardValue">Gift Card Value (in £, per unit):</label>
                    <input type="number" id="giftCardValue" name="giftCardValue" required min="5" max="200" step="0.01"
                           placeholder="e.g. 5">

                    <label for="quantity">Quantity:</label>
                    <input type="number" id="quantity" name="quantity" required min="1" max="20" step="1"
                           placeholder="e.g. 1">
                </fieldset>

                <fieldset>
                    <legend>Delivery Method</legend>
                    <label for="e-gift">
                        <input type="radio" id="e-gift" name="deliveryMethod" value="e-gift" checked> E-gift (no post
                        fee)
                    </label>
                    <label for="post">
                        <input type="radio" id="post" name="deliveryMethod" value="post"> Post
                    </label>
                </fieldset>
                <!-- Dynamically create extra delivery options with dynamicDeliveryGiftCardFields.js -->
                <div id="delivery-options"></div>
                <input type="submit" value="Submit">
            </form>
            <!-- Dynamically display results after form submission with giftCardCalculator.js -->
            <div id="gift-card-result"></div>
        </section>
    </main>
    <footer>
        <nav aria-label="Footer navigation">
            <a href="index.html">Home</a>
            <a href="giftcard.html">Gift Cards</a>
            <a href="books.html">Book Library</a>
        </nav>
        <p>&copy; 2026 The Book Hub. All rights reserved.</p>
        <p>Powered by <a href="https://openlibrary.org" target="_blank" class="externalUrl">OpenLibrary</a>.</p>
        <p>
            <img src="https://jigsaw.w3.org/css-validator/images/vcss" alt="Valid CSS!" width="88" height="31">
        </p>
    </footer>
</div>
</body>
</html>
