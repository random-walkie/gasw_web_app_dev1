<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interest Rate Calculator Form</title>
    <link rel="stylesheet" href="interestRateCalculator.css">
    <script defer src="interestRateCalculator.js"></script>
</head>
<body>
<div class="calculator-container">
    <div class="calculator-card">
        <div class="calculator-header">
            <h3>Interest Rate Calculator</h3>
        </div>
        <div class="calculator-body">
            <form id="interestRateCalculatorForm" action="#">
                <div class="form-group">
                    <label for="initialAmount" class="form-label">Principal (£)</label>
                    <input id="initialAmount" type="number" min="0" maxlength="10" step="0.01" class="form-control"
                           placeholder="e.g. 1000" required>
                </div>
                <div class="form-group">
                    <label for="interestRate" class="form-label">Rate (%)</label>
                    <input id="interestRate" type="number" min="0" max="100" step="0.01" class="form-control"
                           placeholder="e.g. 5" required>
                </div>
                <div class="form-group">
                    <label for="yearsInvested" class="form-label">Years</label>
                    <input id="yearsInvested" type="number" min="1" class="form-control" placeholder="e.g. 10" required>
                </div>
                <div class="form-group">
                    <input type="submit" value="Calculate" class="btn-calculate">
                </div>
            </form>
        </div>
        <div id="results" class="calculator-footer"></div>
    </div>
</div>

</body>
</html>
